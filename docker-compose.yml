services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: catora
      POSTGRES_USER: catora
      POSTGRES_PASSWORD: catora
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catora -d catora"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: catora
      MINIO_ROOT_PASSWORD: change-me-in-production
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      CATORA_DATABASE_URL: postgresql+asyncpg://catora:catora@postgres:5432/catora
      CATORA_REDIS_URL: redis://redis:6379/0
      CATORA_S3_ENDPOINT_URL: http://minio:9000
      CATORA_S3_ACCESS_KEY: catora
      CATORA_S3_SECRET_KEY: change-me-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      CATORA_DATABASE_URL: postgresql+asyncpg://catora:catora@postgres:5432/catora
      CATORA_REDIS_URL: redis://redis:6379/0
      CATORA_S3_ENDPOINT_URL: http://minio:9000
      CATORA_S3_ACCESS_KEY: catora
      CATORA_S3_SECRET_KEY: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      CATORA_API_URL: http://api:8000
      NEXT_PUBLIC_CATORA_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  minio-data:
