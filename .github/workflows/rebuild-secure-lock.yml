name: Rebuild secure dependency lock

on:
  push:
    branches:
      - agent/hosted-demo-deployment
    paths:
      - .github/workflows/rebuild-secure-lock.yml

permissions:
  contents: write

jobs:
  rebuild-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/hosted-demo-deployment
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Rebuild lockfile from manifests and root overrides
        shell: bash
        run: |
          rm package-lock.json
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm audit --audit-level=moderate
      - name: Commit clean lockfile and remove one-shot workflow
        shell: bash
        run: |
          rm .github/workflows/rebuild-secure-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/rebuild-secure-lock.yml
          git commit -m "Rebuild secure dependency lockfile"
          git push origin HEAD:agent/hosted-demo-deployment
