name: Shopify public app contract

on:
  pull_request:
    paths:
      - "shopify/public/**"
      - "apps/shopify/**"
      - ".env.example"
      - "docs/shopify-public-acceptance.md"
      - "scripts/accept_shopify_public_app.py"
      - "scripts/validate_shopify_public_app_contract.py"
      - "apps/api/alembic/versions/**"
      - "apps/api/catora_api/config.py"
      - "apps/api/catora_api/api/__init__.py"
      - "apps/api/catora_api/api/shopify_compliance.py"
      - "apps/api/catora_api/api/shopify_public.py"
      - "apps/api/catora_api/db/models/shopify.py"
      - "apps/api/catora_api/ingestion/factory.py"
      - "apps/api/catora_api/schemas/shopify_public.py"
      - "apps/api/catora_api/shopify/compliance.py"
      - "apps/api/catora_api/shopify/compliance_tasks.py"
      - "apps/api/catora_api/shopify/invitations.py"
      - "apps/api/catora_api/shopify/public_installations.py"
      - "apps/api/catora_api/shopify/public_session.py"
      - "apps/api/catora_api/shopify/sync.py"
      - "apps/api/catora_api/shopify/webhooks.py"
      - "apps/api/catora_api/storage.py"
      - "apps/api/catora_api/worker.py"
      - "apps/api/tests/test_config.py"
      - "apps/api/tests/test_shopify_compliance.py"
      - "apps/api/tests/test_shopify_public_acceptance_script.py"
      - "apps/api/tests/test_shopify_public_embedded.py"
      - "apps/api/tests/test_shopify_public_installations.py"
      - "apps/api/tests/test_shopify_public_invitations.py"
      - "apps/api/tests/test_shopify_public_session.py"
      - "apps/api/tests/test_shopify_sync_actor.py"
      - "apps/api/tests/test_shopify_webhook_routing.py"
      - "apps/api/tests/test_storage_delete_prefix.py"
      - ".github/workflows/shopify-public-app-contract.yml"
  push:
    branches: [main]
    paths:
      - "shopify/public/**"
      - "apps/shopify/**"
      - ".env.example"
      - "docs/shopify-public-acceptance.md"
      - "scripts/accept_shopify_public_app.py"
      - "scripts/validate_shopify_public_app_contract.py"
      - "apps/api/alembic/versions/**"
      - "apps/api/catora_api/config.py"
      - "apps/api/catora_api/api/__init__.py"
      - "apps/api/catora_api/api/shopify_compliance.py"
      - "apps/api/catora_api/api/shopify_public.py"
      - "apps/api/catora_api/db/models/shopify.py"
      - "apps/api/catora_api/ingestion/factory.py"
      - "apps/api/catora_api/schemas/shopify_public.py"
      - "apps/api/catora_api/shopify/compliance.py"
      - "apps/api/catora_api/shopify/compliance_tasks.py"
      - "apps/api/catora_api/shopify/invitations.py"
      - "apps/api/catora_api/shopify/public_installations.py"
      - "apps/api/catora_api/shopify/public_session.py"
      - "apps/api/catora_api/shopify/sync.py"
      - "apps/api/catora_api/shopify/webhooks.py"
      - "apps/api/catora_api/storage.py"
      - "apps/api/catora_api/worker.py"
      - "apps/api/tests/test_config.py"
      - "apps/api/tests/test_shopify_compliance.py"
      - "apps/api/tests/test_shopify_public_acceptance_script.py"
      - "apps/api/tests/test_shopify_public_embedded.py"
      - "apps/api/tests/test_shopify_public_installations.py"
      - "apps/api/tests/test_shopify_public_invitations.py"
      - "apps/api/tests/test_shopify_public_session.py"
      - "apps/api/tests/test_shopify_sync_actor.py"
      - "apps/api/tests/test_shopify_webhook_routing.py"
      - "apps/api/tests/test_storage_delete_prefix.py"
      - ".github/workflows/shopify-public-app-contract.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate embedded App Home
        run: npm --prefix apps/shopify run check
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate acceptance harness syntax
        run: python -m py_compile scripts/accept_shopify_public_app.py
      - name: Validate public app source contract
        run: python scripts/validate_shopify_public_app_contract.py
      - name: Install API validation dependencies
        run: python -m pip install --quiet -e 'apps/api[dev]'
      - name: Run focused public app tests
        shell: bash
        run: |
          set +e
          pytest -q \
            apps/api/tests/test_config.py \
            apps/api/tests/test_shopify_compliance.py \
            apps/api/tests/test_shopify_public_acceptance_script.py \
            apps/api/tests/test_shopify_public_embedded.py \
            apps/api/tests/test_shopify_public_installations.py \
            apps/api/tests/test_shopify_public_invitations.py \
            apps/api/tests/test_shopify_public_session.py \
            apps/api/tests/test_shopify_sync_actor.py \
            apps/api/tests/test_shopify_webhook_routing.py \
            apps/api/tests/test_storage_delete_prefix.py \
            > shopify-public-pytest-report.txt 2>&1
          status=$?
          cat shopify-public-pytest-report.txt
          exit "$status"
      - name: Upload focused public app test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shopify-public-pytest-report
          path: shopify-public-pytest-report.txt
          if-no-files-found: error
          retention-days: 3
      - name: Run Ruff on public app foundation
        run: |
          ruff check \
            apps/api/catora_api/config.py \
            apps/api/catora_api/api/__init__.py \
            apps/api/catora_api/api/shopify_compliance.py \
            apps/api/catora_api/api/shopify_public.py \
            apps/api/catora_api/db/models/shopify.py \
            apps/api/catora_api/ingestion/factory.py \
            apps/api/catora_api/schemas/shopify_public.py \
            apps/api/catora_api/shopify/compliance.py \
            apps/api/catora_api/shopify/compliance_tasks.py \
            apps/api/catora_api/shopify/invitations.py \
            apps/api/catora_api/shopify/public_installations.py \
            apps/api/catora_api/shopify/public_session.py \
            apps/api/catora_api/shopify/sync.py \
            apps/api/catora_api/shopify/webhooks.py \
            apps/api/catora_api/storage.py \
            apps/api/catora_api/worker.py \
            apps/api/tests/test_config.py \
            apps/api/tests/test_shopify_compliance.py \
            apps/api/tests/test_shopify_public_acceptance_script.py \
            apps/api/tests/test_shopify_public_embedded.py \
            apps/api/tests/test_shopify_public_installations.py \
            apps/api/tests/test_shopify_public_invitations.py \
            apps/api/tests/test_shopify_public_session.py \
            apps/api/tests/test_shopify_sync_actor.py \
            apps/api/tests/test_shopify_webhook_routing.py \
            apps/api/tests/test_storage_delete_prefix.py \
            scripts/validate_shopify_public_app_contract.py
      - name: Run strict MyPy on public app foundation
        working-directory: apps/api
        run: |
          mypy \
            catora_api/config.py \
            catora_api/api/shopify_compliance.py \
            catora_api/api/shopify_public.py \
            catora_api/db/models/shopify.py \
            catora_api/ingestion/factory.py \
            catora_api/schemas/shopify_public.py \
            catora_api/shopify/compliance.py \
            catora_api/shopify/compliance_tasks.py \
            catora_api/shopify/invitations.py \
            catora_api/shopify/public_installations.py \
            catora_api/shopify/public_session.py \
            catora_api/shopify/sync.py \
            catora_api/shopify/webhooks.py \
            catora_api/storage.py \
            catora_api/worker.py
