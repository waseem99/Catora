name: Refresh Next.js lockfile

on:
  push:
    branches:
      - agent/hosted-demo-deployment
    paths:
      - apps/web/package.json
      - .github/workflows/refresh-next-lock.yml

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/hosted-demo-deployment
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Regenerate exact lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Commit lockfile and remove one-shot workflow
        shell: bash
        run: |
          rm .github/workflows/refresh-next-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/refresh-next-lock.yml
          git commit -m "Refresh Next.js 16.2.11 lockfile"
          git push origin HEAD:agent/hosted-demo-deployment
