name: Integrate buyer intent backend stacks

on:
  push:
    branches:
      - agent/buyer-intent-backend-integration
    paths:
      - '.github/workflows/integrate-buyer-intents.yml'

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/buyer-intent-backend-integration
          fetch-depth: 0
      - name: Fetch parser and template stack
        run: git fetch origin agent/curated-buyer-intent-templates
      - name: Copy validated parser and template files
        run: |
          git checkout FETCH_HEAD -- \
            apps/api/catora_api/api/intent_parsing.py \
            apps/api/catora_api/api/intent_templates.py \
            apps/api/catora_api/enrichment/mock_provider.py \
            apps/api/catora_api/enrichment/types.py \
            apps/api/catora_api/intents/parser.py \
            apps/api/catora_api/intents/templates.py \
            apps/api/catora_api/schemas/intent_templates.py \
            apps/api/catora_api/schemas/intents.py \
            apps/api/tests/test_buyer_intent_templates.py \
            apps/api/tests/test_intent_parsing.py \
            apps/api/tests/test_intent_parsing_api.py \
            docs/buyer-intent-parsing.md \
            docs/buyer-intent-templates.md
      - name: Merge router and package registration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          api_init = Path('apps/api/catora_api/api/__init__.py')
          api_init.write_text(
              '''from catora_api.api.audit_rules import router as audit_rules_router
          from catora_api.api.audits import router as audits_router
          from catora_api.api.auth import router as auth_router
          from catora_api.api.catalog import router as catalog_router
          from catora_api.api.catalog_identity import router as catalog_identity_router
          from catora_api.api.enrichment_policy import router as enrichment_policy_router
          from catora_api.api.ingestion import router as ingestion_router
          from catora_api.api.intent_breakdown import router as _intent_breakdown_router
          from catora_api.api.intent_coverage import router as _intent_coverage_router
          from catora_api.api.intent_parsing import router as intent_parsing_router
          from catora_api.api.intent_runs import router as intent_runs_router
          from catora_api.api.intent_suites import router as _intent_suites_router
          from catora_api.api.intent_templates import router as intent_templates_router
          from catora_api.api.intents import router as intents_router
          from catora_api.api.public_catalog import router as public_catalog_router
          from catora_api.api.recommendations import router as recommendations_router
          from catora_api.api.shopify import router as shopify_router
          from catora_api.api.taxonomy import router as taxonomy_router

          _intent_coverage_router.include_router(_intent_breakdown_router)
          _intent_suites_router.include_router(_intent_coverage_router)
          intent_runs_router.include_router(_intent_suites_router)

          __all__ = [
              "audit_rules_router",
              "audits_router",
              "auth_router",
              "catalog_identity_router",
              "catalog_router",
              "enrichment_policy_router",
              "ingestion_router",
              "intent_parsing_router",
              "intent_runs_router",
              "intent_templates_router",
              "intents_router",
              "public_catalog_router",
              "recommendations_router",
              "shopify_router",
              "taxonomy_router",
          ]
          '''.replace('          ', ''),
              encoding='utf-8',
          )

          intents_init = Path('apps/api/catora_api/intents/__init__.py')
          intents_init.write_text(
              '''from catora_api.intents.matcher import evaluate_intent
          from catora_api.intents.parser import BuyerIntentParsingService, ParsedBuyerIntent
          from catora_api.intents.types import (
              CanonicalFact,
              ConstraintEvaluation,
              FactEvidence,
              IntentConstraint,
              IntentMatchResult,
              IntentProductCandidate,
              SoftPreference,
              StructuredBuyerIntent,
          )

          __all__ = [
              "BuyerIntentParsingService",
              "CanonicalFact",
              "ConstraintEvaluation",
              "FactEvidence",
              "IntentConstraint",
              "IntentMatchResult",
              "IntentProductCandidate",
              "ParsedBuyerIntent",
              "SoftPreference",
              "StructuredBuyerIntent",
              "evaluate_intent",
          ]
          '''.replace('          ', ''),
              encoding='utf-8',
          )

          main = Path('apps/api/catora_api/main.py')
          text = main.read_text(encoding='utf-8')
          text = text.replace(
              '    ingestion_router,\n    intent_runs_router,\n    intents_router,\n',
              '    ingestion_router,\n    intent_parsing_router,\n    intent_runs_router,\n'
              '    intent_templates_router,\n    intents_router,\n',
          )
          text = text.replace(
              'app.include_router(enrichment_policy_router)\n'
              'app.include_router(intent_runs_router)\n'
              'app.include_router(intents_router)\n',
              'app.include_router(enrichment_policy_router)\n'
              'app.include_router(intent_parsing_router)\n'
              'app.include_router(intent_runs_router)\n'
              'app.include_router(intent_templates_router)\n'
              'app.include_router(intents_router)\n',
          )
          main.write_text(text, encoding='utf-8')
          PY
      - name: Commit integrated backend stack
        run: |
          git rm .github/workflows/integrate-buyer-intents.yml
          git config user.name 'Catora integration bot'
          git config user.email 'actions@users.noreply.github.com'
          git add apps/api docs
          git commit -m 'Integrate buyer intent parser and templates'
          git push origin HEAD:agent/buyer-intent-backend-integration
