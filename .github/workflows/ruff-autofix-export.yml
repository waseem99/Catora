name: Ruff Autofix Export

on:
  pull_request:
    paths:
      - '.github/workflows/ruff-autofix-export.yml'
      - 'apps/api/catora_api/api/__init__.py'
      - 'apps/api/tests/test_intent_runs.py'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install --quiet -e 'apps/api[dev]'
      - name: Apply pinned Ruff safe fixes
        run: >-
          python -m ruff check --fix
          apps/api/catora_api/api/__init__.py
          apps/api/tests/test_intent_runs.py
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-autofixed-source
          path: |
            apps/api/catora_api/api/__init__.py
            apps/api/tests/test_intent_runs.py
          retention-days: 1
