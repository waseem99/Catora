name: Finalize demo generated files

on:
  push:
    branches: [agent/client-demo-e2e]
    paths:
      - .github/workflows/finalize-demo-generated-files.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/client-demo-e2e
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --quiet ruff==0.12.8
      - name: Replace temporary typing exception
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          service_path = Path("apps/api/catora_api/demo/service.py")
          service = service_path.read_text()
          service = service.replace(
              "        findings = (\n"
              "            await session.scalars(\n"
              "                select(AuditFinding).where(",
              "        findings = cast(\n"
              "            list[AuditFinding],\n"
              "            (\n"
              "                await session.scalars(\n"
              "                    select(AuditFinding).where(",
              1,
          )
          service = service.replace(
              "                )\n"
              "            )\n"
              "        ).all()\n"
              "        findings.sort(",
              "                    )\n"
              "                )\n"
              "            ).all(),\n"
              "        )\n"
              "        findings.sort(",
              1,
          )
          service_path.write_text(service)

          pyproject_path = Path("apps/api/pyproject.toml")
          pyproject = pyproject_path.read_text()
          pyproject = pyproject.replace(
              "[[tool.mypy.overrides]]\n"
              "module = \"catora_api.demo.service\"\n"
              "disable_error_code = [\"attr-defined\"]\n\n",
              "",
              1,
          )
          pyproject_path.write_text(pyproject)
          PY
          python -m ruff format apps/api/catora_api/demo/service.py
          python -m ruff check apps/api/catora_api/demo/service.py
      - name: Resolve patched dependency lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Commit generated files
        shell: bash
        run: |
          rm .github/workflows/finalize-demo-generated-files.yml
          git config user.name "catora-release-bot"
          git config user.email "catora-release-bot@users.noreply.github.com"
          git add package-lock.json apps/api/catora_api/demo/service.py apps/api/pyproject.toml
          git add .github/workflows/finalize-demo-generated-files.yml
          git commit -m "Finalize audited demo dependencies"
          git push origin HEAD:agent/client-demo-e2e
