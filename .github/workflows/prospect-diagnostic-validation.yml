name: Prospect diagnostic validation

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: prospect-diagnostic-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-acceptance:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: catora
          POSTGRES_USER: catora
          POSTGRES_PASSWORD: catora
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U catora -d catora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CATORA_DATABASE_URL: postgresql+asyncpg://catora:catora@localhost:5432/catora
      CATORA_REDIS_URL: redis://localhost:6379/0
      CATORA_S3_ENDPOINT_URL: http://localhost:9000
      CATORA_S3_ACCESS_KEY: test
      CATORA_S3_SECRET_KEY: test-secret
      CATORA_DEMO_PASSWORD: ci-demo-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install --quiet -e 'apps/api[dev]'
      - name: Validate prospect workspace isolation and cleanup
        shell: bash
        run: |
          set +e
          (
            cd apps/api
            alembic upgrade head
            migrate_status=$?
            if [ "$migrate_status" -ne 0 ]; then
              exit "$migrate_status"
            fi
            python scripts/seed_enterprise_demo.py
            seed_status=$?
            if [ "$seed_status" -ne 0 ]; then
              exit "$seed_status"
            fi
            python scripts/validate_prospect_diagnostic.py
          ) > /tmp/prospect-diagnostic-report.txt 2>&1
          status=$?
          tail -n 120 /tmp/prospect-diagnostic-report.txt
          exit "$status"
      - name: Upload prospect diagnostic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prospect-diagnostic-report
          path: /tmp/prospect-diagnostic-report.txt
          if-no-files-found: error
          retention-days: 3
