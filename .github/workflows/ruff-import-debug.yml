name: Ruff import normalization

on:
  pull_request:
    paths:
      - "apps/api/catora_api/config.py"
      - ".github/workflows/ruff-import-debug.yml"

permissions:
  contents: read

jobs:
  show-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --quiet ruff==0.12.8
      - name: Capture Ruff import rewrite
        shell: bash
        run: |
          ruff check --fix apps/api/catora_api/config.py
          git diff -- apps/api/catora_api/config.py > ruff-import.diff
          test -s ruff-import.diff
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-import-rewrite
          path: ruff-import.diff
          if-no-files-found: error
          retention-days: 1
