name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Run web lint
        shell: bash
        run: |
          set +e
          npm run lint > web-lint-report.txt 2>&1
          status=$?
          cat web-lint-report.txt
          exit "$status"
      - name: Upload web lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-lint-report
          path: web-lint-report.txt
          retention-days: 3
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  api-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install --quiet -e 'apps/api[dev]'
      - name: Validate hosted deployment and enterprise demo assets
        shell: bash
        run: |
          python -m py_compile scripts/smoke_hosted_demo.py
          python -m py_compile apps/api/scripts/seed_enterprise_demo.py
          python -m py_compile apps/api/scripts/export_sales_demo_shopify_csv.py
          python -m py_compile apps/api/scripts/validate_sales_demo_shopify_csv.py
          python - <<'PY'
          import json
          from pathlib import Path

          for path in (
              Path("apps/web/vercel.json"),
              Path("deploy/railway/api.railway.json"),
              Path("deploy/railway/worker.railway.json"),
          ):
              with path.open(encoding="utf-8") as handle:
                  payload = json.load(handle)
              if not isinstance(payload, dict) or not payload.get("$schema"):
                  raise SystemExit(f"Invalid deployment config: {path}")
          PY
      - name: Run Ruff
        shell: bash
        run: |
          set +e
          python -m ruff check apps/api > ruff-report.txt 2>&1
          status=$?
          cat ruff-report.txt
          exit "$status"
      - name: Upload Ruff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.txt
          retention-days: 3
      - name: Run strict MyPy
        shell: bash
        run: |
          set +e
          python -m mypy \
            --config-file apps/api/pyproject.toml \
            apps/api/catora_api \
            > mypy-report.txt 2>&1
          status=$?
          cat mypy-report.txt
          exit "$status"
      - name: Upload MyPy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt
          retention-days: 3

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: catora
          POSTGRES_USER: catora
          POSTGRES_PASSWORD: catora
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U catora -d catora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CATORA_DATABASE_URL: postgresql+asyncpg://catora:catora@localhost:5432/catora
      CATORA_REDIS_URL: redis://localhost:6379/0
      CATORA_S3_ENDPOINT_URL: http://localhost:9000
      CATORA_S3_ACCESS_KEY: test
      CATORA_S3_SECRET_KEY: test-secret
      CATORA_DEMO_PASSWORD: ci-demo-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install --quiet -e 'apps/api[dev]'
      - name: Run API tests
        shell: bash
        run: |
          set +e
          python -m pytest apps/api/tests > pytest-report.txt 2>&1
          status=$?
          cat pytest-report.txt
          exit "$status"
      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.txt
          retention-days: 3
      - name: Run migrations and enterprise-demo reset smoke test
        shell: bash
        run: |
          set +e
          (
            cd apps/api
            alembic upgrade head
            upgrade_status=$?
            if [ "$upgrade_status" -ne 0 ]; then
              exit "$upgrade_status"
            fi
            python scripts/seed_enterprise_demo.py
            first_seed_status=$?
            if [ "$first_seed_status" -ne 0 ]; then
              exit "$first_seed_status"
            fi
            python scripts/seed_enterprise_demo.py
            second_seed_status=$?
            if [ "$second_seed_status" -ne 0 ]; then
              exit "$second_seed_status"
            fi
            python scripts/export_sales_demo_shopify_csv.py \
              --output /tmp/northstar-shopify-products.csv
            export_status=$?
            if [ "$export_status" -ne 0 ]; then
              exit "$export_status"
            fi
            python scripts/validate_sales_demo_shopify_csv.py \
              /tmp/northstar-shopify-products.csv
            validation_status=$?
            if [ "$validation_status" -ne 0 ]; then
              exit "$validation_status"
            fi
            alembic downgrade -1
          ) > /tmp/migration-report.txt 2>&1
          status=$?
          tail -n 100 /tmp/migration-report.txt > /tmp/migration-tail.txt
          cat /tmp/migration-tail.txt
          exit "$status"
      - name: Upload enterprise migration tail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-migration-tail
          path: /tmp/migration-tail.txt
          if-no-files-found: error
          retention-days: 3

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.1
          git /repo --redact --no-banner
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Audit Node.js dependencies
        shell: bash
        run: |
          set +e
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund \
            > npm-audit-report.txt 2>&1
          install_status=$?
          if [ "$install_status" -eq 0 ]; then
            npm audit --audit-level=moderate >> npm-audit-report.txt 2>&1
            audit_status=$?
          else
            audit_status="$install_status"
          fi
          cat npm-audit-report.txt
          exit "$audit_status"
      - name: Upload Node.js audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.txt
          retention-days: 3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Audit Python dependencies
        shell: bash
        run: |
          set +e
          python -m pip install pip-audit==2.10.1 > pip-audit-report.txt 2>&1
          install_status=$?
          if [ "$install_status" -eq 0 ]; then
            pip-audit apps/api --strict >> pip-audit-report.txt 2>&1
            audit_status=$?
          else
            audit_status="$install_status"
          fi
          cat pip-audit-report.txt
          exit "$audit_status"
      - name: Upload Python audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.txt
          retention-days: 3
