name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  api-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install --quiet -e 'apps/api[dev]'
      - name: Run Ruff
        shell: bash
        run: |
          set +e
          python -m ruff check apps/api > ruff-report.txt 2>&1
          status=$?
          cat ruff-report.txt
          exit "$status"
      - name: Upload Ruff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.txt
          retention-days: 3
      - name: Run strict MyPy
        shell: bash
        run: |
          set +e
          python -m mypy \
            --config-file apps/api/pyproject.toml \
            apps/api/catora_api \
            > mypy-report.txt 2>&1
          status=$?
          cat mypy-report.txt
          exit "$status"
      - name: Upload MyPy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt
          retention-days: 3

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: catora
          POSTGRES_USER: catora
          POSTGRES_PASSWORD: catora
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U catora -d catora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CATORA_DATABASE_URL: postgresql+asyncpg://catora:catora@localhost:5432/catora
      CATORA_REDIS_URL: redis://localhost:6379/0
      CATORA_S3_ENDPOINT_URL: http://localhost:9000
      CATORA_S3_ACCESS_KEY: test
      CATORA_S3_SECRET_KEY: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install --quiet -e 'apps/api[dev]'
      - run: python -m pytest apps/api/tests
      - run: cd apps/api && alembic upgrade head && alembic downgrade -1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.1
          git /repo --redact --no-banner
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Audit Node.js dependencies
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm audit --audit-level=moderate
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Audit Python dependencies
        run: |
          python -m pip install pip-audit==2.10.1
          pip-audit apps/api --strict
